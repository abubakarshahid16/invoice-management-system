{% extends "base.html" %}
{% block title %}Company Settings{% endblock %}
{% block content %}
<div class="hero">
    <h1>Company Settings</h1>
    <form method="post">
        <label>Company Name</label>
        <input name="company_name" value="{{ company.name if company else '' }}">
        <button type="submit">Update Name</button>
    </form>
</div>
{% endblock %}
